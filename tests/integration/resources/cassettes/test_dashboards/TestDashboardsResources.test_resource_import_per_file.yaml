        {"data_source": "metrics", "name": "query3", "query": "system.cpu.iowait{host:raspberrypi}"},
        {"data_source": "metrics", "name": "query4", "query": "system.cpu.user{host:raspberrypi}"},
        {"data_source": "metrics", "name": "query5", "query": "system.cpu.stolen{host:raspberrypi}"}],
        "display_type": "area"}]}}, {"id": 1, "definition": {"title": "Processes memory
