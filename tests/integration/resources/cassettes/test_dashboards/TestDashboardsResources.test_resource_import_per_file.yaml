        "standard", "name_aliases": [], "restricted": false}}, {"id": "4fbb1652-dd15-11e8-9308-77be61fbb2c7",
        "type": "permissions", "attributes": {"created": "2018-10-31T14:00:23.650159Z",
        "description": "Read log data, possibly scoped to one or more indexes. In
        order to read log data, a user must have both this permission and Logs Read
        Data. This permission can be granted in a limited capacity per index from
        the Logs interface or APIs. If granted via the Roles interface or API the
        permission has global scope. Restrictions are limited to the Log Management
        product.", "display_name": "Logs Read Index Data", "display_type": "read",
        "group_name": "Log Management", "name": "logs_read_index_data", "name_aliases":
        [], "restricted": false}}, {"id": "4fbd1e66-dd15-11e8-9308-53cb90e4ef1c",
        "type": "permissions", "attributes": {"created": "2018-10-31T14:00:23.664332Z",
        "description": "Read and modify all indexes in your account. This includes
        the ability to grant the Logs Read Index Data and Logs Write Exclusion Filters
        permission to other roles, for some or all indexes.", "display_name": "Logs
        Modify Indexes", "display_type": "write", "group_name": "Log Management",
        "name": "logs_modify_indexes", "name_aliases": [], "restricted": false}},
        {"id": "4fbeec96-dd15-11e8-9308-d3aac44f93e5", "type": "permissions", "attributes":
        {"created": "2018-10-31T14:00:23.67618Z", "description": "View the live tail
        feed for all log indexes, even if otherwise specifically restricted.", "display_name":
        "Logs Live Tail", "display_type": "read", "group_name": "Log Management",
        "name": "logs_live_tail", "name_aliases": [], "restricted": false}}, {"id":
        "4fc2807c-dd15-11e8-9308-d3bfffb7f039", "type": "permissions", "attributes":
        {"created": "2018-10-31T14:00:23.699543Z", "description": "Add and change
        exclusion filters for all or some log indexes. Can be granted in a limited
        capacity per index to specific roles via the Logs interface or API. If granted
        from the Roles interface or API, the permission has global scope.", "display_name":
        "Logs Write Exclusion Filters", "display_type": "write", "group_name": "Log
        Management", "name": "logs_write_exclusion_filters", "name_aliases": [], "restricted":
        false}}, {"id": "4fc43656-dd15-11e8-9308-f3e2bb5e31b4", "type": "permissions",
        "attributes": {"created": "2018-10-31T14:00:23.710821Z", "description": "Add
